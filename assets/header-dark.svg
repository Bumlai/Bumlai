<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480" role="img" aria-label="Gabriel Bumlai · Co-fundador SIDEX">
  <defs>
    <style>
      .cream { fill: #F5F0E8; }
      .light { fill: #C9C9C5; }
      .muted { fill: #7A7A75; }
      .accent { fill: #FFA801; }
      .accent-line { stroke: #FFA801; stroke-width: 2; }

      .eyebrow {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
        letter-spacing: 8px;
        font-weight: 400;
      }
      .title {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 110px;
        font-weight: 400;
        letter-spacing: -2px;
      }
      .subtitle {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
        letter-spacing: 8px;
        font-weight: 400;
      }
      .quote {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 30px;
        font-style: italic;
        font-weight: 400;
      }
    </style>
  </defs>

  <line x1="80" y1="80" x2="80" y2="400" class="accent-line"/>

  <text x="120" y="110" class="eyebrow muted">PORTFÓLIO</text>

  <text x="120" y="240" class="title cream">Gabriel Bumlai</text>

  <text x="120" y="295" class="subtitle accent">CO-FUNDADOR · SIDEX</text>

  <line x1="120" y1="335" x2="220" y2="335" class="accent-line"/>

  <text x="120" y="395" class="quote light">&#8220;Cada sistema deveria ter o cuidado de quem o construiu.&#8221;</text>
</svg>
